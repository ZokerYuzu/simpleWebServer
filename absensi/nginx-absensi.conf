# =============================================================
#  Nginx Server Block – Sistem Absensi Karyawan
#  File: /etc/nginx/sites-available/absensi
#
#  Jalankan perintah berikut setelah menyalin file ini:
#    sudo ln -s /etc/nginx/sites-available/absensi \
#               /etc/nginx/sites-enabled/absensi
#    sudo nginx -t && sudo systemctl reload nginx
# =============================================================

server {
    listen 80;
    listen [::]:80;

    # Ganti sesuai hostname / IP WSL Anda.
    # Untuk akses lokal cukup gunakan IP WSL (cek: hostname -I)
    server_name absensi.local;

    # Root dokumen – sesuaikan path ke folder project Anda
    root /var/www/absensi;
    index index.php index.html;

    # ── Charset & Security Headers ─────────────────────────
    charset utf-8;
    add_header X-Frame-Options "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header X-XSS-Protection "1; mode=block"        always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Logging ────────────────────────────────────────────
    access_log /var/log/nginx/absensi_access.log;
    error_log  /var/log/nginx/absensi_error.log;

    # ── Ukuran maksimal upload (opsional) ──────────────────
    client_max_body_size 8M;

    # ── Routing Utama ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM Handler ────────────────────────────────────
    location ~ \.php$ {
        # Pastikan file PHP benar-benar ada (cegah exploit)
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Socket PHP-FPM – sesuaikan versi PHP yang terinstall
        # Cek socket: ls /run/php/
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;

        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        include fastcgi_params;

        # Timeout untuk query database yang sedikit lebih lama
        fastcgi_read_timeout 60;
    }

    # ── Blokir akses ke file sensitif ─────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Cache asset statis (opsional) ──────────────────────
    location ~* \.(ico|css|js|gif|jpg|jpeg|png|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
